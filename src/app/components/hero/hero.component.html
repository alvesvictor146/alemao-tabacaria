<section id="hero" class="hero">
  <!-- Background Video -->
  <div class="hero__background">
    <video autoplay loop muted playsinline class="hero__video">
      <source src="assets/People_socializing_in_hookah_lounge_202606151500.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Particle Canvas -->
  <canvas #particleCanvas class="hero__particles"></canvas>

  <!-- Overlay Gradient -->
  <div class="hero__overlay"></div>

  <!-- Content -->
  <div class="hero__content" [class.loaded]="loaded()">
    <!-- Logo -->
    <div class="hero__logo">
      <div class="hero__logo-icon">
        <svg width="50" height="50" viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="65" r="28" stroke="#D4A524" stroke-width="2" fill="none"/>
          <path d="M38 65 C38 50, 50 40, 50 25 C50 40, 62 50, 62 65" stroke="#D4A524" stroke-width="2" fill="none" opacity="0.6"/>
          <path d="M42 65 C42 55, 50 48, 50 35 C50 48, 58 55, 58 65" stroke="#D4A524" stroke-width="1.5" fill="none" opacity="0.4"/>
        </svg>
      </div>
      <h2 class="hero__brand">ALEMÃO</h2>
      <span class="hero__brand-sub">TABACARIA</span>
    </div>

    <!-- Title -->
    <h1 class="hero__title">
      Mais que uma tabacaria.
      <span class="hero__title-highlight">Uma experiência premium.</span>
    </h1>

    <!-- Subtitle -->
    <p class="hero__subtitle">
      Os melhores tabacos, bebidas e acessórios selecionados para quem valoriza exclusividade.
    </p>

    <!-- CTA Buttons -->
    <div class="hero__actions">
      <button class="hero__btn hero__btn--primary" (click)="scrollToCategories()" id="btn-catalog">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Ver Catálogo
      </button>
      <button class="hero__btn hero__btn--outline" (click)="openWhatsApp()" id="btn-whatsapp-hero">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Falar no WhatsApp
      </button>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="hero__scroll-indicator" [class.loaded]="loaded()">
    <div class="hero__scroll-mouse">
      <div class="hero__scroll-dot"></div>
    </div>
    <span>Rolar para baixo</span>
  </div>
</section>
