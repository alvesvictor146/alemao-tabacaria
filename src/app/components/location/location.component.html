<section id="location" class="location">
  <div class="location__container">
    <!-- Section Header -->
    <div class="section-header" appScrollAnimate>
      <span class="section-label">Onde Estamos</span>
      <h2 class="section-title">Venha nos <span class="text-gradient">visitar</span></h2>
      <div class="section-divider"></div>
    </div>

    <div class="location__grid">
      <!-- Map -->
      <div class="location__map" appScrollAnimate [hiddenClass]="'scroll-hidden-left'" [animationClass]="'scroll-visible-left'">
        <iframe
          [src]="mapUrl"
          width="100%"
          height="100%"
          style="border:0;"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Localização da Alemão Tabacaria">
        </iframe>
      </div>

      <!-- Contact Info -->
      <div class="location__info" appScrollAnimate [hiddenClass]="'scroll-hidden-right'" [animationClass]="'scroll-visible-right'">
        @for (info of contactInfo; track info.label) {
          <a
            class="location__card"
            [href]="info.link || 'javascript:void(0)'"
            [target]="info.link ? '_blank' : '_self'"
            [class.clickable]="info.link">
            <div class="location__card-icon" [innerHTML]="info.icon"></div>
            <div class="location__card-text">
              <span class="location__card-label">{{ info.label }}</span>
              <strong class="location__card-value">{{ info.value }}</strong>
              @if (info.subValue) {
                <span class="location__card-sub">{{ info.subValue }}</span>
              }
            </div>
          </a>
        }
      </div>
    </div>
  </div>
</section>
